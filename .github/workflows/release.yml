name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            spec: build/netscanx-windows.spec
            artifact: NetScanX-Start-Windows.exe
          - os: macos-latest
            spec: build/netscanx-macos.spec
            artifact: NetScanX-Start-macOS
          - os: ubuntu-latest
            spec: build/netscanx-linux.spec
            artifact: NetScanX-Start-Linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build dependencies
        run: pip install -e ".[build]"
      - name: Build portable launcher
        run: pyinstaller ${{ matrix.spec }} --noconfirm --distpath dist --workpath build/_work
      - name: Create DMG (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p dmg-root
          cp "dist/${{ matrix.artifact }}" dmg-root/
          chmod +x "dmg-root/${{ matrix.artifact }}"
          hdiutil create -volname "NetScanX" -srcfolder dmg-root -ov -format UDZO "dist/NetScanX-Start-macOS.dmg"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
      - name: Upload DMG artifact (macOS only)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: NetScanX-Start-macOS.dmg
          path: dist/NetScanX-Start-macOS.dmg
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifact layout
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" release/* \
            --title "NetScanX ${{ github.ref_name }}" \
            --generate-notes
