name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            spec: build/netscanx-windows.spec
            artifact: NetScanX-Start-Windows.exe
          - os: macos-latest
            spec: build/netscanx-macos.spec
            artifact: NetScanX-Start-macOS
          - os: ubuntu-latest
            spec: build/netscanx-linux.spec
            artifact: NetScanX-Start-Linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build dependencies
        run: pip install -e ".[build]"
      - name: Build portable launcher
        run: pyinstaller ${{ matrix.spec }} --noconfirm --distpath dist --workpath build/_work
      - name: Sign Windows executable (self-signed, no CA)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          CODESIGN_PFX_BASE64: ${{ secrets.CODESIGN_PFX_BASE64 }}
          CODESIGN_PFX_PASSWORD: ${{ secrets.CODESIGN_PFX_PASSWORD }}
        run: |
          $pfxPath = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODESIGN_PFX_BASE64))
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "signtool.exe" -Recurse |
            Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1
          & $signtool.FullName sign /f $pfxPath /p $env:CODESIGN_PFX_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 "dist/${{ matrix.artifact }}"
          Remove-Item $pfxPath
      - name: Create DMG (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p dmg-root
          cp "dist/${{ matrix.artifact }}" dmg-root/
          chmod +x "dmg-root/${{ matrix.artifact }}"
          hdiutil create -volname "NetScanX" -srcfolder dmg-root -ov -format UDZO "dist/NetScanX-Start-macOS.dmg"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
      - name: Upload DMG artifact (macOS only)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: NetScanX-Start-macOS.dmg
          path: dist/NetScanX-Start-macOS.dmg
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifact layout
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" release/* \
            --title "NetScanX ${{ github.ref_name }}" \
            --generate-notes
